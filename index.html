            --gold: #d9b382; --brown: #3d2e24; --bg: #f9f6f2; --white: #ffffff; --whatsapp: #25D366; --red: #ff4d4d; --teal: #2A9D8F; --blue: #3498db;

        header { background: var(--white); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Auth Modal - محدّث */

        .auth-header h2 { color: var(--brown); font-weight: 900; font-size: 1.5rem; }
        .auth-close { position: absolute; top: 15px; left: 15px; background: var(--red); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .auth-close:hover { transform: rotate(90deg); background: #cc0000; }
        
        .auth-input-group { margin-bottom: 15px; }

        .auth-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--gold), #c9a067); color: white; border: none; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin: 10px 0 15px; }

    <!-- Firebase Config - ضع config الخاص بك هنا -->
    <script>
        // Firebase Configuration - استبدل بـ config الخاص بك
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "123456789",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let phoneConfirmation;
        let recaptchaVerifier;
        
        // Global Variables
        let currentUser = null;
        let cartItems = JSON.parse(localStorage.getItem('shababekCart')) || [];
        
        // 1) Phone Verification
        function sendPhoneVerification() {
            const phone = document.getElementById('regPhone').value.trim();
            if (!phone || phone.length !== 10 || !phone.startsWith('07')) {
                showAuthMessage('يرجى إدخال رقم هاتف صحيح (07XXXXXXXX)', 'error');
                return;
            }
            
            const phoneNumber = '+964' + phone.slice(1);
            showAuthMessage('جاري إرسال الرمز...', 'success');
            
            // Recaptcha
            recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'invisible',
                'callback': function() {
                    // reCAPTCHA solved
                }
            });
            
            auth.signInWithPhoneNumber(phoneNumber, recaptchaVerifier)
                .then((confirmationResult) => {
                    phoneConfirmation = confirmationResult;
                    document.getElementById('phoneStep').style.display = 'none';
                    document.getElementById('otpStep').style.display = 'block';
                    showAuthMessage('تم إرسال الرمز للهاتف', 'success');
                })
                .catch((error) => {
                    console.error('Phone verification error:', error);
                    showAuthMessage('خطأ في إرسال الرمز: ' + error.message, 'error');
                });
        }
        
        function verifyPhone() {
            const code = document.getElementById('otpInput').value.trim();
            if (code.length !== 4) {
                showAuthMessage('أدخل 4 أرقام', 'error');
                return;
            }
            
            showAuthMessage('جاري التحقق...', 'success');
            phoneConfirmation.confirm(code)
                .then((result) => {
                    completeUserRegistration(result.user);
                })
                .catch((error) => {
                    showAuthMessage('رمز التحقق خاطئ', 'error');
                });
        }
        
        // 2) Google Sign In
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.addScope('email');
            provider.addScope('profile');
            
            auth.signInWithPopup(provider)
                .then((result) => {
                    completeUserRegistration(result.user);
                })
                .catch((error) => {
                    showAuthMessage('خطأ في تسجيل Google: ' + error.message, 'error');
                });
        }
        
        // 3) Complete User Registration & Save Data
        function completeUserRegistration(firebaseUser) {
            const uid = firebaseUser.uid;
            const userData = {
                fullName: firebaseUser.displayName || firebaseUser.phoneNumber || 'عميل جديد',
                phone: firebaseUser.phoneNumber || '',
                email: firebaseUser.email || '',
                photoUrl: firebaseUser.photoURL || '',
                authMethod: firebaseUser.phoneNumber ? 'phone' : 'google',
                createdAt: new Date().toISOString(),
                lastLogin: new Date().toISOString(),
                isActive: true
            };
            
            // Save to Firebase (users/{uid})
            db.ref('users/' + uid).set(userData)
                .then(() => {
                    // Save to localStorage
                    localStorage.setItem('shababekuser', JSON.stringify(userData));
                    currentUser = userData;
                    
                    // Update UI
                    updateAccountUI(userData);
                    closeAuthModal();
                    confettiSuccess();
                    showSuccessToast('تم تسجيل الدخول بنجاح!');
                })
                .catch(error => {
                    console.error('Save user error:', error);
                    showAuthMessage('خطأ في حفظ البيانات', 'error');
                });
        }
        
        // 4) Auth State Observer
        auth.onAuthStateChanged((firebaseUser) => {
            if (firebaseUser) {
                const uid = firebaseUser.uid;
                // Load user data from Firebase
                db.ref('users/' + uid).once('value')
                    .then(snapshot => {
                        const userData = snapshot.val();
                        if (userData && userData.isActive) {
                            localStorage.setItem('shababekuser', JSON.stringify(userData));
                            currentUser = userData;
                            updateAccountUI(userData);
                            loadUserData(); // Load addresses & orders
                        }
                    });
            } else {
                // Check localStorage for cached user
                const savedUser = localStorage.getItem('shababekuser');
                if (savedUser) {
                    const userData = JSON.parse(savedUser);
                    if (userData.isActive) {
                        currentUser = userData;
                        updateAccountUI(userData);
                    }
                }
            }
        });
        
        // 5) Update Account UI
        function updateAccountUI(userData) {
            document.getElementById('accountName').textContent = userData.fullName;
            document.getElementById('accountPhone').textContent = userData.phone || '-';
            document.getElementById('accountEmail').textContent = userData.email || 'غير محدد';
            
            const avatar = document.getElementById('accountAvatar');
            if (userData.photoUrl) {
                avatar.innerHTML = `<img src="${userData.photoUrl}" alt="Profile">`;
            } else {
                avatar.innerHTML = '<i class="fas fa-user"></i>';
            }
            
            // Profile displays
            document.getElementById('profileNameDisplay').textContent = userData.fullName;
            document.getElementById('profilePhoneDisplay').textContent = userData.phone || '-';
            document.getElementById('profileEmailDisplay').textContent = userData.email || '-';
            
            document.getElementById('accountIcon').classList.add('logged-in');
            document.getElementById('loginDot').style.display = 'block';
        }
        
        // 6) Load User Data (Addresses & Orders)
        function loadUserData() {
            if (!currentUser) return;
            
            loadAddresses();
            loadOrders();
        }
        
        function loadAddresses() {
            const uid = currentUser.uid || getUidFromLocal();
            if (!uid) return;
            
            db.ref('user_addresses/' + uid).once('value')
                .then(snapshot => {
                    const addressesList = document.getElementById('addressesList');
                    addressesList.innerHTML = '';
                    
                    if (snapshot.exists()) {
                        snapshot.forEach(childSnapshot => {
                            const address = childSnapshot.val();
                            const addressId = childSnapshot.key;
                            addressesList.innerHTML += `
                                <div class="address-item">
                                    <strong>${address.label || 'عنوان'}</strong><br>
                                    <span>${address.city || ''}, ${address.street || address.area || ''}</span><br>
                                    <small>${address.notes || ''}</small><br>
                                    ${address.isDefault ? '<span style="color: var(--teal);">عنوان افتراضي ✓</span>' : ''}
                                    <div style="margin-top: 10px;">
                                        <button class="btn-account" onclick="setDefaultAddress('${addressId}')">افتراضي</button>
                                        <button class="btn-account" onclick="editAddress('${addressId}')">تعديل</button>
                                        <button class="btn-account danger" onclick="deleteAddress('${addressId}')">حذف</button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        addressesList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">لا توجد عناوين محفوظة</p>';
                    }
                });
        }
        
        function loadOrders() {
            const uid = currentUser.uid || getUidFromLocal();
            if (!uid) return;
            
            db.ref('user_orders/' + uid).once('value')
                .then(snapshot => {
                    const ordersList = document.getElementById('ordersList');
                    ordersList.innerHTML = '';
                    
                    if (snapshot.exists()) {
                        let html = '';
                        snapshot.forEach(childSnapshot => {
                            const order = childSnapshot.val();
                            html += `
                                <div class="order-item">
                                    <strong>طلب #${childSnapshot.key.slice(-6)}</strong><br>
                                    <span>${new Date(order.orderDate).toLocaleDateString('ar')} | ${order.total || 0} د.ع</span><br>
                                    <small>الحالة: ${order.status === 'delivered' ? 'تم التسليم' : order.status === 'pending' ? 'قيد الانتظار' : 'في الطريق'}</small>
                                </div>
                            `;
                        });
                        ordersList.innerHTML = html || '<p style="color: #999;">لا توجد طلبات</p>';
                    } else {
                        ordersList.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">لا توجد طلبات</p>';
                    }
                });
        }
        
        // 7) Account Functions
        function openAccount() {
            document.getElementById('accountModal').classList.add('active');
            if (currentUser) {
                loadUserData();
            }
        }
        
        function editProfile() {
            const name = prompt('الاسم الكامل:');
            const phone = prompt('رقم الهاتف:');
            
            if (name && currentUser) {
                const updates = { fullName: name };
                if (phone) updates.phone = phone;
                updates.lastLogin = new Date().toISOString();
                
                db.ref('users/' + currentUser.uid).update(updates)
                    .then(() => {
                        currentUser.fullName = name;
                        currentUser.phone = phone || currentUser.phone;
                        localStorage.setItem('shababekuser', JSON.stringify(currentUser));
                        updateAccountUI(currentUser);
                        alert('تم تحديث البيانات!');
                    });
            }
        }
        
        function showAddAddressForm() {
            const label = prompt('اسم العنوان (البيت/المكتب):');
            const city = prompt('المدينة:');
            const street = prompt('العنوان الكامل:');
            const notes = prompt('ملاحظات (اختياري):');
            
            if (label && city) {
                const addressData = {
                    label, city, street: street || '', notes: notes || '',
                    createdAt: new Date().toISOString()
                };
                
                const uid = currentUser.uid || getUidFromLocal();
                db.ref('user_addresses/' + uid).push(addressData)
                    .then(() => {
                        loadAddresses();
                        alert('تم حفظ العنوان!');
                    });
            }
        }
        
        function setDefaultAddress(addressId) {
            const uid = currentUser.uid || getUidFromLocal();
            db.ref('user_addresses/' + uid).once('value').then(snapshot => {
                const updates = {};
                snapshot.forEach(child => {
                    updates[child.key + '/isDefault'] = child.key === addressId;
                });
                db.ref('user_addresses/' + uid).update(updates);
                loadAddresses();
            });
        }
        
        function deleteAddress(addressId) {
            if (confirm('هل أنت متأكد؟')) {
                const uid = currentUser.uid || getUidFromLocal();
                db.ref(`user_addresses/${uid}/${addressId}`).remove()
                    .then(() => loadAddresses());
            }
        }
        
        function logoutApp() {
            if (confirm('هل تريد تسجيل الخروج؟')) {
                auth.signOut().then(() => {
                    currentUser = null;
                    localStorage.removeItem('shababekuser');
                    document.getElementById('accountIcon').classList.remove('logged-in');
                    document.getElementById('loginDot').style.display = 'none';
                    document.getElementById('accountModal').classList.remove('active');
                });
            }
        }
        
        // 8) Utility Functions
        function getUidFromLocal() {
            const user = JSON.parse(localStorage.getItem('shababekuser') || '{}');
            return user.uid;
        }
        
        function getCurrentUserUid() {
            return currentUser?.uid || getUidFromLocal();
        }
        
        function showAuthMessage(message, type) {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = message;
            msgEl.className = `auth-message ${type}`;
        }
        
        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
            resetAuthSteps();
        }
        
        function resetAuthSteps() {
            document.getElementById('phoneStep').style.display = 'block';
            document.getElementById('otpStep').style.display = 'none';
            document.getElementById('otpInput').value = '';
            document.getElementById('regPhone').value = '';
            if (recaptchaVerifier) recaptchaVerifier.clear();
            document.getElementById('recaptcha-container').innerHTML = '';
            showAuthMessage('', '');
        }
        
        function confettiSuccess() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
        
        function showSuccessToast(message) {
            // Simple toast
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:20px;left:20px;background:var(--teal);color:white;padding:15px 20px;border-radius:10px;z-index:99999;font-weight:700;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // باقي الدوال الأصلية (showPage, toggleCartModal, etc.) كما هي...
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        // Initialize on load
        window.onload = function() {
            // Check auth state
            const savedUser = localStorage.getItem('shababekuser');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                if (userData.isActive) {
                    updateAccountUI(userData);
                }
            }
        };
    </script>
</body>
</html>
