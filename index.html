<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - المتجر الرسمي | Shababek Curtains</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/3y1ZNCk0/1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --gold: #d9b382; --brown: #3d2e24; --bg: #f9f6f2; --white: #ffffff; --red: #ff4d4d; --teal: #2A9D8F; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--white); color: var(--brown); overflow-x: hidden; }

        /* الهيدر المطور حسب الترتيب المطلوب */
        header { 
            background: var(--white); padding: 10px 5%; display: flex; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        .header-right { flex: 2; display: flex; align-items: center; gap: 15px; justify-content: flex-start; }
        .store-brand { display: flex; flex-direction: column; line-height: 1.1; }
        .store-name-ar { font-size: 1.4rem; font-weight: 900; color: var(--brown); white-space: nowrap; }
        .store-name-en { font-size: 0.75rem; color: var(--gold); font-weight: 600; }

        .logo-center { flex: 1; display: flex; justify-content: center; cursor: pointer; }
        .logo-img { height: 75px; }

        .header-left { flex: 2; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }

        /* أيقونات احترافية */
        .icon-btn { 
            position: relative; width: 45px; height: 45px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .account-btn { background: var(--brown); color: white; }
        .cart-btn { background: var(--gold); color: white; }
        .account-dot { position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; background: var(--teal); border-radius: 50%; border: 2px solid white; display: none; }

        .search-box { 
            position: relative; width: 40px; height: 40px; transition: 0.4s; overflow: hidden; 
            border: 1px solid #eee; border-radius: 12px; display: flex; align-items: center; 
        }
        .search-box:focus-within { width: 180px; border-color: var(--gold); }
        .search-box input { border: none; outline: none; padding: 10px; width: 140px; font-size: 0.8rem; }

        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 0.7rem; font-weight: 900; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

        /* مودالات */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content { background: var(--bg); width: 90%; max-width: 420px; border-radius: 25px; padding: 30px; position: relative; }

        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 1.1rem; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; }
        .btn-google { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }

        .page { display: none; padding: 20px 5%; animation: fadeIn 0.4s; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تصميم كرت المنتج */
        .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .prod-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .prod-card img { width: 100%; height: 180px; object-fit: cover; }
        .prod-info { padding: 10px; text-align: center; }
        .prod-price { color: var(--gold); font-weight: 900; }

        @media (max-width: 768px) {
            .store-name-ar { font-size: 1.1rem; }
            .logo-img { height: 55px; }
            header { padding: 10px 3%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-right">
            <div class="store-brand">
                <span class="store-name-ar">شبابيك للستائر</span>
                <span class="store-name-en">Shababek Curtains</span>
            </div>
            <div class="icon-btn account-btn" onclick="openAccount()">
                <i class="fas fa-user"></i>
                <div class="account-dot" id="loginDot"></div>
            </div>
        </div>

        <div class="logo-center" onclick="showPage('homePage')">
            <img src="https://i.ibb.co/3y1ZNCk0/1.png" class="logo-img">
        </div>

        <div class="header-left">
            <div class="search-box">
                <i class="fas fa-search" style="padding:10px"></i>
                <input type="text" id="searchInput" placeholder="بحث عن موديل..." onkeyup="handleSearch()">
            </div>
            <div class="icon-btn cart-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-basket"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
            
            <div id="phoneStep">
                <input type="tel" id="userPhone" class="auth-input" placeholder="07XXXXXXXX" value="07">
                <div id="recaptcha-container"></div>
                <button class="btn-gold" onclick="sendOTP()">إرسال رمز التحقق</button>
            </div>

            <div id="otpStep" style="display:none;">
                <input type="text" id="otpInput" class="auth-input" placeholder="أدخل الرمز المستلم">
                <button class="btn-gold" onclick="verifyOTP()">تأكيد الرمز</button>
            </div>

            <div style="margin: 20px 0; text-align:center; position:relative;">
                <hr> <span style="position:absolute; top:-12px; background:var(--bg); padding:0 10px; left:40%;">أو عبر</span>
            </div>

            <button class="btn-gold btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> المتابعة عبر Google
            </button>
            
            <button class="btn-gold" style="background:#666; margin-top:15px;" onclick="closeAuthModal()">إغلاق</button>
        </div>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <h3 id="userNameDisp">مرحباً بك</h3>
            <p id="userPhoneDisp" style="color:var(--gold); margin-bottom:20px;"></p>
            
            <div style="display:grid; gap:10px;">
                <button class="btn-gold" onclick="showPage('ordersPage'); closeUserModal();">📦 طلباتي</button>
                <button class="btn-gold" onclick="showPage('favPage'); closeUserModal();">❤️ المفضلة</button>
                <button class="btn-gold" style="background:var(--red)" onclick="logout()">تسجيل الخروج</button>
            </div>
            <button class="btn-gold" style="background:#666; margin-top:10px;" onclick="closeUserModal()">إغلاق</button>
        </div>
    </div>

    <div class="modal" id="cartModal">
        <div class="modal-content" style="max-width:500px; text-align:right;">
            <h3>🛒 سلة المشتريات</h3>
            <div id="cartItems" style="margin:20px 0; max-height:300px; overflow-y:auto;"></div>
            
            <div style="border-top:1px solid #ddd; padding-top:15px;">
                <label>المحافظة:</label>
                <select id="checkoutCity" class="auth-input" style="font-size:0.9rem; padding:8px;">
                    <option value="بغداد">بغداد</option><option value="البصرة">البصرة</option><option value="نينوى">نينوى</option>
                </select>
                <label>طريقة الدفع المفضلة:</label>
                <select id="checkoutPayment" class="auth-input" style="font-size:0.9rem; padding:8px;">
                    <option value="نقد عند الاستلام">نقد عند الاستلام</option>
                    <option value="زين كاش">زين كاش</option>
                </select>
            </div>

            <div id="cartTotal" style="font-weight:900; margin-bottom:15px;">الإجمالي: 0 د.ع</div>
            <button class="btn-gold" onclick="sendOrderWA()">إرسال الطلب عبر واتساب</button>
            <button class="btn-gold" style="background:#666; margin-top:10px;" onclick="toggleCart()">إغلاق</button>
        </div>
    </div>

    <main>
        <div id="homePage" class="page active">
            <h2 style="margin-bottom:20px;">📁 الأقسام</h2>
            <div id="catsList" class="prod-grid"></div>
        </div>

        <div id="catView" class="page">
            <h2 id="currentCatTitle"></h2>
            <div id="prodsList" class="prod-grid" style="margin-top:20px;"></div>
        </div>

        <div id="ordersPage" class="page">
            <h2>📦 سجل الطلبات</h2>
            <div id="userOrders" style="margin-top:20px;"></div>
        </div>
        
        <div id="favPage" class="page">
            <h2>❤️ المنتجات المفضلة</h2>
            <div id="userFavs" class="prod-grid" style="margin-top:20px;"></div>
        </div>
    </main>

    <script>
        // Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyD1TENeV6RKWmrYIjV6seGx84VavsM_tvE", 
            authDomain: "shababekcurtain.firebaseapp.com", 
            databaseURL: "https://shababekcurtain-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "shababekcurtain" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let appUser = null;
        let cart = [];
        let confirmationResult = null;

        // تهيئة ReCaptcha
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

        // التحقق من حالة المستخدم
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await db.ref('users/' + user.uid).once('value');
                if (snap.exists()) {
                    appUser = snap.val();
                } else {
                    appUser = { 
                        uid: user.uid, 
                        phone: user.phoneNumber || '', 
                        fullName: user.displayName || 'عميل جديد',
                        email: user.email || '',
                        city: 'بغداد',
                        payMethod: 'نقد عند الاستلام',
                        cart: [],
                        favorites: []
                    };
                    await db.ref('users/' + user.uid).set(appUser);
                }
                document.getElementById('loginDot').style.display = 'block';
                cart = appUser.cart || [];
                syncUI();
            } else {
                appUser = null;
                cart = [];
                document.getElementById('loginDot').style.display = 'none';
                syncUI();
            }
        });

        // --- وظائف الدخول ---
        function openAccount() {
            if (appUser) {
                document.getElementById('userNameDisp').innerText = appUser.fullName;
                document.getElementById('userPhoneDisp').innerText = appUser.phone || appUser.email;
                document.getElementById('userModal').style.display = 'flex';
            } else {
                document.getElementById('authModal').style.display = 'flex';
            }
        }

        async function sendOTP() {
            let phone = document.getElementById('userPhone').value;
            if(!phone.startsWith('+964')) phone = '+964' + phone.substring(phone.startsWith('0')?1:0);
            try {
                confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
                document.getElementById('phoneStep').style.display = 'none';
                document.getElementById('otpStep').style.display = 'block';
            } catch (e) { alert("خطأ: " + e.message); }
        }

        async function verifyOTP() {
            try {
                await confirmationResult.confirm(document.getElementById('otpInput').value);
                closeAuthModal();
                confetti();
            } catch (e) { alert("الرمز خطأ"); }
        }

        async function loginWithGoogle() {
            try {
                await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                closeAuthModal();
                confetti();
            } catch (e) { alert(e.message); }
        }

        function logout() {
            auth.signOut();
            localStorage.removeItem('shababek_cart');
            location.reload();
        }

        // --- وظائف المتجر ---
        function syncUI() {
            document.getElementById('cartCount').innerText = cart.length;
            if (appUser) {
                db.ref('users/' + appUser.uid + '/cart').set(cart);
                // تعبئة تلقائية لبيانات الشحن
                document.getElementById('checkoutCity').value = appUser.city || 'بغداد';
                document.getElementById('checkoutPayment').value = appUser.payMethod || 'نقد عند الاستلام';
            }
        }

        function addToCart(p) {
            cart.push(p);
            syncUI();
            alert("تمت الإضافة للسلة");
        }

        function toggleCart() {
            const m = document.getElementById('cartModal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
            if (m.style.display === 'flex') renderCart();
        }

        function renderCart() {
            let html = '';
            let total = 0;
            cart.forEach((item, i) => {
                total += item.price;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:white; padding:10px; border-radius:10px;">
                    <span>${item.name}</span>
                    <b>${item.price} د.ع <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="removeItem(${i})"></i></b>
                </div>`;
            });
            document.getElementById('cartItems').innerHTML = html || 'السلة فارغة';
            document.getElementById('cartTotal').innerText = `الإجمالي: ${total} د.ع`;
        }

        function removeItem(i) {
            cart.splice(i, 1);
            syncUI();
            renderCart();
        }

        async function sendOrderWA() {
            if (cart.length === 0) return alert("السلة فارغة");
            if (!appUser) return openAccount();

            let city = document.getElementById('checkoutCity').value;
            let pay = document.getElementById('checkoutPayment').value;
            
            // تحديث تفضيلات المستخدم في الـ Database
            db.ref('users/' + appUser.uid).update({ city: city, payMethod: pay });

            let msg = `طلب جديد:\nالعميل: ${appUser.fullName}\nالهاتف: ${appUser.phone}\nالمحافظة: ${city}\nالدفع: ${pay}\n\nالمنتجات:\n`;
            cart.forEach(item => msg += `- ${item.name} (${item.price} د.ع)\n`);
            
            window.open(`https://wa.me/9647883002797?text=${encodeURIComponent(msg)}`);
            
            // مسح السلة بعد الطلب
            cart = [];
            syncUI();
            toggleCart();
        }

        // --- التنقل والبيانات ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = async () => {
            const cats = await db.ref('categories').once('value');
            const list = document.getElementById('catsList');
            cats.forEach(snap => {
                const c = snap.val();
                list.innerHTML += `<div class="prod-card" onclick="openCat('${c.name}')">
                    <img src="${c.img}">
                    <div class="prod-info"><b>${c.name}</b></div>
                </div>`;
            });
        };

        async function openCat(name) {
            showPage('catView');
            document.getElementById('currentCatTitle').innerText = name;
            const prods = await db.ref('products').orderByChild('category').equalTo(name).once('value');
            const list = document.getElementById('prodsList');
            list.innerHTML = '';
            prods.forEach(snap => {
                const p = snap.val();
                list.innerHTML += `<div class="prod-card">
                    <img src="${p.img}">
                    <div class="prod-info">
                        <b>${p.name}</b><br>
                        <span class="prod-price">${p.price} د.ع</span>
                        <button class="btn-gold" style="padding:5px; font-size:0.8rem; margin-top:5px;" onclick='addToCart(${JSON.stringify(p)})'>إضافة للسلة</button>
                    </div>
                </div>`;
            });
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }
        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
    </script>
</body>
</html>
