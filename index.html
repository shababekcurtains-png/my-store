<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="PSQi9qbymm6PIWxeb6c5XIW-8Z5sUz5cIv6q11ONLQk" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - المتجر الرسمي | Shababek Curtains Official Store</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/3y1ZNCk0/1.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --gold: #d9b382; 
            --brown: #3d2e24; 
            --bg: #f9f6f2; 
            --white: #ffffff; 
            --whatsapp: #25D366; 
            --red: #ff4d4d; 
            --teal: #2A9D8F;
            --blue: #3498db;
            --dark: #1c2331;
        }
        
        /* نفس التصميم الأصلي تماماً */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--white); color: var(--brown); overflow-x: hidden; scroll-behavior: smooth; line-height: 1.6; }
        .top-banner { background: var(--brown); color: white; padding: 10px 5%; text-align: center; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .wa-link { color: var(--whatsapp); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        header { background: var(--white); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .store-name-ar { font-size: 1.8rem; font-weight: 900; color: var(--brown); }
        .logo-img { height: 90px; }
        .account-icon, .cart-icon { cursor: pointer; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.4s; }
        .account-icon { background: linear-gradient(145deg, var(--brown), #5a4035); }
        .cart-icon { background: linear-gradient(145deg, var(--gold), #c9a067); position: relative; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; border-radius: 14px; min-width: 28px; text-align: center; border: 2px solid white; }
        .nav-bar { background: #fcfcfc; border-bottom: 1px solid #eee; padding: 12px 0; overflow-x: auto; white-space: nowrap; }
        .nav-menu { display: inline-flex; gap: 25px; list-style: none; padding: 0 20px; }
        .nav-menu a { text-decoration: none; color: var(--brown); font-weight: 700; cursor: pointer; }
        .page { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* نافذة التسجيل */
        .auth-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 11000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .auth-modal.active { display: flex; }
        .auth-modal-content { background: var(--bg); width: 90%; max-width: 450px; border-radius: 25px; padding: 25px; position: relative; }
        .auth-tab { flex: 1; padding: 12px; border: none; background: #f0f0f0; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .auth-tab.active { background: var(--gold); color: white; }
        .auth-input { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 12px; margin-bottom: 15px; font-family: 'Cairo'; }
        .auth-btn { width: 100%; padding: 15px; background: var(--gold); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .google-auth-btn { width: 100%; padding: 12px; background: white; border: 2px solid #ddd; border-radius: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 15px; }
        
        /* تصميم الأقسام والمنتجات */
        #categoriesList { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px 5%; }
        .cat-card-new { position: relative; height: 350px; border-radius: 20px; overflow: hidden; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cat-card-new img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        /* التذييل */
        .footer-cta { background: var(--brown); color: white; padding: 40px 5%; text-align: center; border-radius: 40px 40px 0 0; }
        footer { background: var(--brown); color: rgba(255,255,255,0.6); padding: 30px 5%; text-align: center; }
    </style>
</head>
<body>

    <div class="top-banner">
        <span>🏆 شبابيك للستائر - المتجر الرسمي | ظل وذوق</span>
        <a href="https://wa.me/9647883002797" class="wa-link"><i class="fab fa-whatsapp"></i> واتساب</a>
    </div>

    <header>
        <div class="store-brand">
            <span class="store-name-ar">شبابيك للستائر</span>
        </div>
        <div class="logo-center" onclick="showPage('homePage')">
            <img src="https://i.ibb.co/3y1ZNCk0/1.png" class="logo-img">
        </div>
        <div class="header-left">
            <div class="account-icon" id="accountIcon" onclick="openAccount()">
                <i class="fas fa-user"></i>
            </div>
            <div class="cart-icon" onclick="toggleCartModal()">
                <i class="fas fa-shopping-basket"></i>
                <span id="globalCartCount" class="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="auth-modal" id="authModal">
        <div class="auth-modal-content">
            <button style="position:absolute; left:15px; top:15px; border:none; background:none; font-size:1.5rem;" onclick="closeAuthModal()">×</button>
            <div style="text-align:center; margin-bottom:20px;">
                <img src="https://i.ibb.co/3y1ZNCk0/1.png" style="height:60px;">
                <h2 style="font-weight:900;">دخول شبابيك</h2>
            </div>
            
            <div id="loginForm">
                <label style="font-weight:bold; display:block; margin-bottom:5px;">رقم هاتفك:</label>
                <input type="tel" id="loginPhone" class="auth-input" placeholder="07XXXXXXXX" dir="ltr">
                
                <div id="otpSection" style="display:none;">
                    <label style="font-weight:bold; display:block; margin-bottom:5px;">كود التحقق المرسل لك:</label>
                    <input type="text" id="otpCodeInput" class="auth-input" placeholder="أدخل الكود هنا" maxlength="4">
                    <button class="auth-btn" style="background:var(--teal);" onclick="verifyManualOTP()">تفعيل الحساب الآن</button>
                </div>

                <button class="auth-btn" id="sendOtpBtn" onclick="sendWhatsAppOTP()">
                    <i class="fab fa-whatsapp"></i> الحصول على كود التحقق
                </button>
                
                <div style="text-align:center; margin:15px 0; color:#999;">أو</div>
                
                <button class="google-auth-btn" onclick="loginWithGoogle()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
                    المتابعة مع Google
                </button>
            </div>
        </div>
    </div>

    <main id="mainContainer">
        <div id="homePage" class="page active">
            <section style="padding:40px 5%; text-align:center; background:var(--bg);">
                <h1 style="font-weight:900; font-size:2rem; color:var(--brown);">فخامة التفاصيل تبدأ من شبابيك</h1>
                <p>أرقى الستائر في العراق بلمسة عصرية</p>
                <button onclick="document.getElementById('categories').scrollIntoView({behavior: 'smooth'})" class="btn-gold" style="margin-top:20px; padding:15px 40px; border:none; border-radius:12px; color:white; font-weight:900; cursor:pointer;">تصفح الموديلات</button>
            </section>

            <section id="categories" style="padding: 40px 0;">
                <h2 style="text-align:center; font-weight:900; margin-bottom:15px;">📁 الأقسام</h2>
                <div id="categoriesList"></div>
            </section>
        </div>
    </main>

    <script>
        // إعدادات المتجر
        const STORE_WA = "9647883002797"; // رقم متجرك
        let generatedOTP = null;
        let userPhoneNumber = "";

        // تهيئة Firebase (استخدم بياناتك الأصلية هنا)
        const firebaseConfig = { 
            apiKey: "AIzaSyD1TENeV6RkWmrYIjV6seGx84VavsM_tvE", 
            authDomain: "shababekcurtain.firebaseapp.com", 
            databaseURL: "https://shababekcurtain-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "shababekcurtain" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- نظام التحقق عبر واتساب (بدون API) ---

        function sendWhatsAppOTP() {
            const phone = document.getElementById('loginPhone').value.trim();
            if (!phone || phone.length < 10) return alert("الرجاء إدخال رقم هاتف صحيح");

            // 1. توليد كود عشوائي من 4 أرقام
            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            userPhoneNumber = phone;

            // 2. تجهيز الرسالة
            const msg = `مرحباً متجر شبابيك للستائر، أود تفعيل حسابي برقم الهاتف: ${phone}. كود التحقق الخاص بي هو: ${generatedOTP}`;
            const url = `https://wa.me/${STORE_WA}?text=${encodeURIComponent(msg)}`;

            // 3. فتح واتساب وتغيير واجهة الموقع
            alert("سيفتح واتساب الآن؛ يرجى ضغط 'إرسال' في واتساب ثم العودة هنا لكتابة الكود.");
            window.open(url, '_blank');

            document.getElementById('sendOtpBtn').style.display = 'none';
            document.getElementById('otpSection').style.display = 'block';
        }

        function verifyManualOTP() {
            const inputCode = document.getElementById('otpCodeInput').value.trim();
            if (inputCode == generatedOTP) {
                alert("✅ تم التحقق بنجاح! أهلاً بك في شبابيك.");
                // هنا نقوم بإنشاء جلسة وهمية أو تسجيله في قاعدة البيانات كـ Verified
                localStorage.setItem('user_verified_phone', userPhoneNumber);
                closeAuthModal();
                confetti({ particleCount: 150, spread: 70 });
            } else {
                alert("❌ كود التحقق غير صحيح، يرجى التأكد من الرسالة التي أرسلتها في واتساب.");
            }
        }

        // --- بقية دوال المتجر (كما هي في الكود الأصلي) ---

        function openAccount() {
            if (localStorage.getItem('user_verified_phone')) {
                alert("أنت مسجل بالفعل برقم: " + localStorage.getItem('user_verified_phone'));
            } else {
                document.getElementById('authModal').classList.add('active');
            }
        }

        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                alert("تم الدخول بنجاح عبر جوجل: " + result.user.displayName);
                closeAuthModal();
            } catch (e) { alert("خطأ في الدخول"); }
        }

        // تحميل الأقسام
        db.ref('categories').on('value', snap => {
            const cats = snap.val();
            const list = document.getElementById('categoriesList');
            if(cats) {
                list.innerHTML = Object.values(cats).map(c => `
                    <div class="cat-card-new" onclick="alert('سيتم فتح قسم: ${c.name}')">
                        <img src="${c.img}">
                        <div style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:white;padding:10px 25px;border-radius:12px;font-weight:900;">${c.name}</div>
                    </div>
                `).join('');
            }
        });

    </script>
</body>
</html>
