<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبابيك للستائر - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (الإصدارات المحدثة) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        :root {
            --gold: #d9b382;
            --brown: #3d2e24;
            --bg: #f9f6f2;
            --white: #ffffff;
            --red: #ff4d4d;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--gold);
        }
        
        .logo h1 {
            color: var(--brown);
            font-size: 1.8rem;
            margin-top: 10px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .tab.active {
            background: var(--gold);
            color: white;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 1rem;
            transition: 0.3s;
        }
        
        .input-group input:focus {
            border-color: var(--gold);
            outline: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        
        .btn-primary:hover {
            background: #b58f5a;
            transform: translateY(-2px);
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #eee;
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
        }
        
        .social-buttons {
            display: flex;
            gap: 15px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        
        .social-btn.facebook {
            background: #1877f2;
            color: white;
        }
        
        .social-btn.google {
            background: #db4437;
            color: white;
        }
        
        .social-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            cursor: pointer;
        }
        
        .toggle-link span {
            color: var(--gold);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <img src="https://i.ibb.co/3y1ZNCk0/1.png" alt="شعار شبابيك">
                <h1>شبابيك للستائر</h1>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">تسجيل دخول</button>
                <button class="tab" onclick="switchTab('register')">إنشاء حساب</button>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- نموذج تسجيل الدخول -->
            <div id="loginForm">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="********">
                </div>
                <button class="btn-primary" onclick="loginWithEmail()">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
            </div>
            
            <!-- نموذج إنشاء حساب -->
            <div id="registerForm" style="display: none;">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="registerName" placeholder="محمد أحمد">
                </div>
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="registerEmail" placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="registerPassword" placeholder="********">
                </div>
                <div class="input-group">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPassword" placeholder="********">
                </div>
                <button class="btn-primary" onclick="registerWithEmail()">
                    <i class="fas fa-user-plus"></i> إنشاء حساب
                </button>
            </div>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <div class="social-buttons">
                <button class="social-btn facebook" onclick="loginWithFacebook()">
                    <i class="fab fa-facebook-f"></i> فيسبوك
                </button>
                <button class="social-btn google" onclick="loginWithGoogle()">
                    <i class="fab fa-google"></i> جوجل
                </button>
            </div>
            
            <div class="toggle-link" id="toggleText" onclick="toggleForms()">
                ليس لديك حساب؟ <span>إنشاء حساب جديد</span>
            </div>
        </div>
    </div>

    <script>
        // ===== تهيئة Firebase بمفاتيح صحيحة =====
        const firebaseConfig = {
            apiKey: "AIzaSyD1TENeV6RkWmrYIjV6seGx84VavsM_tvE",
            authDomain: "shababekcurtain.firebaseapp.com",
            databaseURL: "https://shababekcurtain-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shababekcurtain",
            storageBucket: "shababekcurtain.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ===== متغيرات عامة =====
        let currentUser = null;

        // ===== دوال التبديل بين النماذج =====
        function switchTab(tab) {
            const loginTab = document.querySelectorAll('.tab')[0];
            const registerTab = document.querySelectorAll('.tab')[1];
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const toggleText = document.getElementById('toggleText');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggleText.innerHTML = 'ليس لديك حساب؟ <span>إنشاء حساب جديد</span>';
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggleText.innerHTML = 'لديك حساب بالفعل؟ <span>تسجيل الدخول</span>';
            }
        }

        function toggleForms() {
            if (document.getElementById('loginForm').style.display !== 'none') {
                switchTab('register');
            } else {
                switchTab('login');
            }
        }

        // ===== دوال عرض الرسائل =====
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + message;
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';
            successDiv.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        // ===== تسجيل الدخول بالإيميل =====
        function loginWithEmail() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    currentUser = userCredential.user;
                    showSuccess('تم تسجيل الدخول بنجاح!');
                    setTimeout(() => {
                        window.location.href = 'https://shababekcurtains.com';
                    }, 1500);
                })
                .catch((error) => {
                    let errorMessage = 'حدث خطأ في تسجيل الدخول';
                    switch(error.code) {
                        case 'auth/user-not-found':
                            errorMessage = 'لا يوجد حساب بهذا البريد الإلكتروني';
                            break;
                        case 'auth/wrong-password':
                            errorMessage = 'كلمة المرور غير صحيحة';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = 'البريد الإلكتروني غير صالح';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    showError(errorMessage);
                });
        }

        // ===== إنشاء حساب جديد =====
        function registerWithEmail() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!name || !email || !password || !confirm) {
                showError('الرجاء ملء جميع الحقول');
                return;
            }

            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            if (password !== confirm) {
                showError('كلمة المرور غير متطابقة');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // تحديث اسم المستخدم
                    user.updateProfile({
                        displayName: name
                    }).then(() => {
                        // حفظ بيانات المستخدم في Realtime Database
                        db.ref('users/' + user.uid).set({
                            name: name,
                            email: email,
                            createdAt: new Date().toISOString(),
                            orders: [],
                            addresses: [],
                            favorites: [],
                            payments: []
                        }).then(() => {
                            showSuccess('تم إنشاء الحساب بنجاح!');
                            setTimeout(() => {
                                window.location.href = 'https://shababekcurtains.com';
                            }, 1500);
                        });
                    });
                })
                .catch((error) => {
                    let errorMessage = 'حدث خطأ في إنشاء الحساب';
                    switch(error.code) {
                        case 'auth/email-already-in-use':
                            errorMessage = 'البريد الإلكتروني مستخدم بالفعل';
                            break;
                        case 'auth/invalid-email':
                            errorMessage = 'البريد الإلكتروني غير صالح';
                            break;
                        case 'auth/weak-password':
                            errorMessage = 'كلمة المرور ضعيفة جداً';
                            break;
                        default:
                            errorMessage = error.message;
                    }
                    showError(errorMessage);
                });
        }

        // ===== تسجيل الدخول عبر فيسبوك =====
        function loginWithFacebook() {
            const provider = new firebase.auth.FacebookAuthProvider();
            
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    
                    // التحقق من وجود المستخدم في قاعدة البيانات
                    db.ref('users/' + user.uid).once('value').then((snapshot) => {
                        if (!snapshot.exists()) {
                            db.ref('users/' + user.uid).set({
                                name: user.displayName,
                                email: user.email,
                                photoURL: user.photoURL,
                                createdAt: new Date().toISOString(),
                                orders: [],
                                addresses: [],
                                favorites: [],
                                payments: []
                            });
                        }
                    });
                    
                    showSuccess('تم تسجيل الدخول عبر فيسبوك بنجاح!');
                    setTimeout(() => {
                        window.location.href = 'https://shababekcurtains.com';
                    }, 1500);
                })
                .catch((error) => {
                    showError('حدث خطأ في تسجيل الدخول عبر فيسبوك: ' + error.message);
                });
        }

        // ===== تسجيل الدخول عبر جوجل =====
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    
                    // التحقق من وجود المستخدم في قاعدة البيانات
                    db.ref('users/' + user.uid).once('value').then((snapshot) => {
                        if (!snapshot.exists()) {
                            db.ref('users/' + user.uid).set({
                                name: user.displayName,
                                email: user.email,
                                photoURL: user.photoURL,
                                createdAt: new Date().toISOString(),
                                orders: [],
                                addresses: [],
                                favorites: [],
                                payments: []
                            });
                        }
                    });
                    
                    showSuccess('تم تسجيل الدخول عبر جوجل بنجاح!');
                    setTimeout(() => {
                        window.location.href = 'https://shababekcurtains.com';
                    }, 1500);
                })
                .catch((error) => {
                    showError('حدث خطأ في تسجيل الدخول عبر جوجل: ' + error.message);
                });
        }

        // ===== مراقبة حالة المصادقة =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                console.log('المستخدم مسجل الدخول:', user.email);
            } else {
                console.log('لا يوجد مستخدم مسجل');
            }
        });

        // ===== التحقق من صحة الاتصال بـ Firebase =====
        window.addEventListener('load', () => {
            console.log('تم تحميل الصفحة، جاري التحقق من اتصال Firebase...');
            
            // اختبار بسيط للاتصال
            auth.app.authentication().then(() => {
                console.log('✅ Firebase متصل بنجاح');
            }).catch((error) => {
                console.error('❌ خطأ في اتصال Firebase:', error);
                showError('مشكلة في الاتصال، يرجى تحديث الصفحة');
            });
        });
    </script>
</body>
</html>
