<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="PSQi9qbymm6PIWxeb6c5XIW-8Z5sUz5cIv6q11ONLQk" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - المتجر الرسمي | Shababek Curtains Official Store</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/3y1ZNCk0/1.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --gold: #d9b382; 
            --brown: #3d2e24; 
            --bg: #f9f6f2; 
            --white: #ffffff; 
            --whatsapp: #25D366; 
            --red: #ff4d4d; 
            --teal: #2A9D8F;
            --blue: #3498db;
            --light-gold: #f5e6d3;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--white); color: var(--brown); overflow-x: hidden; scroll-behavior: smooth; }

        header { 
            background: var(--white); 
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* ترتيب الهيدر المطلوب */
        .store-brand { flex: 1.5; display: flex; flex-direction: column; }
        .store-name-ar { font-size: 1.6rem; font-weight: 900; color: var(--brown); }
        .store-name-en { font-size: 0.8rem; color: var(--gold); }
        
        .header-account-section { flex: 1; display: flex; justify-content: center; }
        .logo-center { flex: 1; display: flex; justify-content: center; cursor: pointer; }
        .header-left-tools { flex: 1.5; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }

        .logo-img { height: 80px; }
        
        .account-icon, .cart-icon {
            position: relative;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .account-icon { background: var(--brown); color: white; }
        .cart-icon { background: var(--gold); color: white; }
        .account-dot { position: absolute; top: -2px; right: -2px; width: 12px; height: 12px; background: var(--teal); border-radius: 50%; border: 2px solid white; display: none; }
        .account-icon.logged-in .account-dot { display: block; }

        .search-box { 
            position: relative; width: 40px; height: 40px; transition: 0.4s; overflow: hidden; 
            border: 1px solid #eee; border-radius: 12px; display: flex; align-items: center; background: white;
        }
        .search-box:focus-within { width: 180px; border-color: var(--gold); }
        .search-box input { border: none; outline: none; padding: 10px; width: 140px; font-size: 0.8rem; }
        
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 0.7rem; font-weight: 900; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

        /* الأقسام والصفحات */
        .page { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* بطاقات المنتجات */
        #categoriesList, #catGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px 5%; }
        .cat-card-new { position: relative; height: 300px; border-radius: 20px; overflow: hidden; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cat-card-new img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card-label { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--gold); color: white; padding: 8px 20px; border-radius: 10px; font-weight: 900; }

        /* مودالات */
        .auth-modal, .account-modal, #cartOverlay, .edit-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .active-flex { display: flex !important; }
        .modal-content { background: var(--white); width: 90%; max-width: 450px; border-radius: 25px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }

        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-red { background: var(--red); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        .nav-bar { background: #fcfcfc; border-bottom: 1px solid #eee; padding: 10px 0; overflow-x: auto; white-space: nowrap; }
        .nav-menu { display: inline-flex; gap: 20px; list-style: none; padding: 0 20px; }
        .nav-menu a { text-decoration: none; color: var(--brown); font-weight: 700; font-size: 0.9rem; }

        /* التنسيق الخاص بالجوال */
        @media (max-width: 768px) {
            header { padding: 10px 3%; }
            .store-name-ar { font-size: 1.1rem; }
            .logo-img { height: 60px; }
            .account-icon, .cart-icon { width: 40px; height: 40px; border-radius: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="store-brand">
            <span class="store-name-ar">شبابيك للستائر</span>
            <span class="store-name-en">Shababek Curtains</span>
        </div>
        
        <div class="header-account-section">
            <div class="account-icon" id="accountIcon" onclick="openAccount()">
                <i class="fas fa-user"></i>
                <span class="account-dot" id="loginDot"></span>
            </div>
        </div>
        
        <div class="logo-center" onclick="handleLogoClick()">
            <img src="https://i.ibb.co/3y1ZNCk0/1.png" class="logo-img">
        </div>
        
        <div class="header-left-tools">
            <div class="search-box">
                <i class="fas fa-search" style="padding: 10px;"></i>
                <input type="text" id="searchInput" placeholder="بحث..." onkeyup="handleSmartSearch()">
            </div>
            <div class="cart-icon" onclick="toggleCartModal()">
                <i class="fas fa-shopping-basket"></i>
                <span id="globalCartCount" class="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="nav-bar">
        <ul class="nav-menu">
            <li><a onclick="showPage('homePage')">الرئيسية</a></li>
            <li><a onclick="showPage('homePage'); document.getElementById('categories').scrollIntoView();">المنتجات</a></li>
            <li><a onclick="showPage('paymentPage')">طرق الدفع</a></li>
            <li><a onclick="showPage('aboutPage')">من نحن</a></li>
        </ul>
    </div>

    <div class="auth-modal" id="authModal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
            <div id="phoneStep">
                <label>رقم الهاتف</label>
                <input type="tel" id="loginPhone" style="width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:10px;" placeholder="07XXXXXXXX" value="07">
                <button class="btn-gold" style="background:var(--whatsapp)" onclick="sendPhoneOTP()">إرسال الرمز عبر واتساب</button>
            </div>
            <div id="otpStep" style="display:none;">
                <label>أدخل الرمز المستلم</label>
                <input type="text" id="otpInput" style="width:100%; padding:15px; text-align:center; font-size:1.5rem; letter-spacing:10px;" maxlength="4">
                <button class="btn-gold" onclick="verifyPhoneOTP()">تأكيد الدخول</button>
            </div>
            <button class="btn-gold" style="background:#444; margin-top:10px;" onclick="closeAuthModal()">إغلاق</button>
        </div>
    </div>

    <div class="account-modal" id="accountModal">
        <div class="modal-content">
            <h3 id="accountName" style="color:var(--gold)">أهلاً بك</h3>
            <p id="accountPhone" style="margin-bottom:20px;"></p>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button class="btn-gold" onclick="showOrdersPage()">📦 طلباتي</button>
                <button class="btn-gold" onclick="showPaymentsPage()">💳 طرق الدفع المفضلة</button>
                <button class="btn-gold" style="background:var(--red)" onclick="logoutApp()">تسجيل الخروج</button>
            </div>
            <button class="btn-gold" style="background:#ccc; color:#333;" onclick="closeAccountModal()">إغلاق</button>
        </div>
    </div>

    <div id="ordersPage" class="page">
        <div style="padding: 20px 5%;">
            <h2>طلباتي السابقة</h2>
            <div id="ordersList"></div>
            <button class="btn-gold" onclick="showPage('homePage')">العودة للرئيسية</button>
        </div>
    </div>

    <div id="userPaymentsPage" class="page">
        <div style="padding: 20px 5%;">
            <h2>طرق الدفع المفضلة</h2>
            <div id="userSavedPayments"></div>
            <hr style="margin:20px 0;">
            <h4>إضافة بطاقة جديدة</h4>
            <input type="text" id="newCardName" placeholder="اسم البطاقة (مثلاً: زين كاش)" style="width:100%; padding:10px; margin:10px 0;">
            <button class="btn-gold" onclick="saveNewPaymentMethod()">حفظ البطاقة</button>
            <button class="btn-gold" style="background:#ccc" onclick="showPage('homePage')">رجوع</button>
        </div>
    </div>

    <div id="favoritesPage" class="page">
        <div style="padding: 20px 5%;">
            <h2>قائمة المفضلة</h2>
            <div id="favoritesList"></div>
            <button class="btn-gold" onclick="showPage('homePage')">متابعة التسوق</button>
        </div>
    </div>

    <div id="cartOverlay" onclick="if(event.target===this) toggleCartModal()">
        <div class="modal-content">
            <h3>🛒 سلة المشتريات</h3>
            <div id="cartItemsList"></div>
            <div id="checkoutFields" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                <label>المحافظة:</label>
                <select id="userCity" style="width:100%; padding:10px; margin-bottom:10px;">
                    <option value="بغداد">بغداد</option><option value="البصرة">البصرة</option><option value="نينوى">نينوى</option><option value="أربيل">أربيل</option>
                </select>
                <label>طريقة الدفع:</label>
                <select id="userPayment" style="width:100%; padding:10px;"></select>
            </div>
            <button class="btn-gold" onclick="sendOrder()">تأكيد الطلب (WhatsApp)</button>
            <button class="btn-gold" style="background:#eee; color:#333" onclick="toggleCartModal()">إغلاق</button>
        </div>
    </div>

    <main id="mainContainer">
        <div id="homePage" class="page active">
            <section id="categories">
                <h2 style="text-align:center; padding-top:20px;">الأقسام</h2>
                <div id="categoriesList"></div>
            </section>
        </div>
        
        <div id="categoryView" class="page">
            <h2 id="catTitle" style="text-align:center; padding:20px;"></h2>
            <div id="catGrid"></div>
        </div>
    </main>

    <script>
        // تكوين Firebase (نفس الإعدادات السابقة)
        const firebaseConfig = { 
            apiKey: "AIzaSyD1TENeV6RKWmrYIjV6seGx84VavsM_tvE", 
            authDomain: "shababekcurtain.firebaseapp.com", 
            databaseURL: "https://shababekcurtain-default-rtdb.asia-southeast1.firebasedatabase.app/", 
            projectId: "shababekcurtain" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let cart = JSON.parse(localStorage.getItem('shababek_cart')) || [];
        let appUser = JSON.parse(localStorage.getItem('shababek_user')) || null;
        let generatedOTP = null;
        let pendingPhone = null;

        // تحديث عداد السلة
        function updateCartCount() {
            document.getElementById('globalCartCount').innerText = cart.length;
            localStorage.setItem('shababek_cart', JSON.stringify(cart));
        }

        // --- نظام الدخول المحسن ---
        function sendPhoneOTP() {
            let phone = document.getElementById('loginPhone').value.trim();
            if(phone.length < 10) return alert("أدخل رقم صحيح");
            
            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            pendingPhone = phone;
            
            // تنسيق الرقم للواتساب (إزالة الصفر الأول وإضافة 964)
            let formattedPhone = phone.startsWith('0') ? '964' + phone.substring(1) : phone;
            let msg = `كود التحقق الخاص بك في شبابيك هو: ${generatedOTP}`;
            
            window.open(`https://wa.me/${formattedPhone}?text=${encodeURIComponent(msg)}`, '_blank');
            
            document.getElementById('phoneStep').style.display = 'none';
            document.getElementById('otpStep').style.display = 'block';
            alert("تم فتح واتساب لإرسال الكود لك. أدخله هنا بعد استلامه.");
        }

        async function verifyPhoneOTP() {
            let code = document.getElementById('otpInput').value;
            if(code != generatedOTP) return alert("الكود غير صحيح");

            let uid = "phone_" + pendingPhone.replace(/\D/g, '');
            let userSnap = await db.ref('users/' + uid).once('value');
            
            if(userSnap.exists()) {
                appUser = userSnap.val();
            } else {
                appUser = { uid: uid, phone: pendingPhone, fullName: "عميل شبابيك", addresses: [], payments: [], cart: cart };
                await db.ref('users/' + uid).set(appUser);
            }
            
            // استرجاع السلة المحفوظة إذا كانت السلة الحالية فارغة
            if(cart.length === 0 && appUser.cart) cart = appUser.cart;

            localStorage.setItem('shababek_user', JSON.stringify(appUser));
            updateAccountUI();
            closeAuthModal();
            confetti();
        }

        function logoutApp() {
            localStorage.removeItem('shababek_user');
            localStorage.removeItem('shababek_cart');
            cart = [];
            appUser = null;
            updateCartCount();
            updateAccountUI();
            closeAccountModal();
            showPage('homePage');
        }

        function updateAccountUI() {
            const dot = document.getElementById('loginDot');
            if(appUser) {
                dot.style.display = 'block';
                document.getElementById('accountName').innerText = appUser.fullName;
                document.getElementById('accountPhone').innerText = appUser.phone;
            } else {
                dot.style.display = 'none';
            }
        }

        // --- إدارة الطلبات وطرق الدفع ---
        async function showOrdersPage() {
            if(!appUser) return;
            closeAccountModal();
            showPage('ordersPage');
            const list = document.getElementById('ordersList');
            list.innerHTML = "جاري التحميل...";
            
            let snap = await db.ref('orders').orderByChild('uid').equalTo(appUser.uid).once('value');
            if(!snap.exists()) {
                list.innerHTML = "<p>لا توجد طلبات</p>";
                return;
            }

            let html = '';
            snap.forEach(child => {
                let order = child.val();
                html += `
                    <div style="background:#f9f9f9; padding:15px; margin-bottom:10px; border-radius:12px; position:relative;">
                        <b>طلب #${child.key.slice(-5)}</b>
                        <p>${order.summary}</p>
                        <span style="color:var(--gold)">${order.total} د.ع</span>
                        <button class="btn-red" style="position:absolute; left:10px; top:10px;" onclick="deleteOrder('${child.key}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        async function deleteOrder(id) {
            if(confirm("هل تريد حذف هذا الطلب من السجل؟")) {
                await db.ref('orders/'+id).remove();
                showOrdersPage();
            }
        }

        async function showPaymentsPage() {
            closeAccountModal();
            showPage('userPaymentsPage');
            renderSavedPayments();
        }

        function renderSavedPayments() {
            const list = document.getElementById('userSavedPayments');
            if(!appUser.payments || appUser.payments.length === 0) {
                list.innerHTML = "<p>لم تضف أي بطاقات بعد</p>";
                return;
            }
            list.innerHTML = appUser.payments.map((p, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; background:#eee; margin-bottom:5px; border-radius:8px;">
                    <span>${p}</span>
                    <i class="fas fa-times" style="color:red; cursor:pointer;" onclick="deletePaymentMethod(${i})"></i>
                </div>
            `).join('');
        }

        async function saveNewPaymentMethod() {
            let name = document.getElementById('newCardName').value;
            if(!name) return;
            if(!appUser.payments) appUser.payments = [];
            appUser.payments.push(name);
            await db.ref('users/'+appUser.uid+'/payments').set(appUser.payments);
            document.getElementById('newCardName').value = "";
            renderSavedPayments();
        }

        async function deletePaymentMethod(index) {
            appUser.payments.splice(index, 1);
            await db.ref('users/'+appUser.uid+'/payments').set(appUser.payments);
            renderSavedPayments();
        }

        // --- إدارة السلة ---
        function toggleCartModal() {
            const overlay = document.getElementById('cartOverlay');
            overlay.classList.toggle('active-flex');
            
            if(overlay.classList.contains('active-flex')) {
                // ملء البيانات تلقائياً
                if(appUser) {
                    if(appUser.addresses && appUser.addresses.length > 0) {
                        document.getElementById('userCity').value = appUser.addresses[0].city;
                    }
                    const paySelect = document.getElementById('userPayment');
                    let payOptions = (appUser.payments || []).map(p => `<option value="${p}">${p}</option>`).join('');
                    paySelect.innerHTML = payOptions + `<option value="نقد عند الاستلام">نقد عند الاستلام</option>`;
                }
                
                let html = cart.map((item, i) => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span>${item.n}</span>
                        <i class="fas fa-trash" style="color:red" onclick="removeFromCart(${i})"></i>
                    </div>
                `).join('');
                document.getElementById('cartItemsList').innerHTML = html || "السلة فارغة";
            }
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            updateCartCount();
            toggleCartModal();
            toggleCartModal();
        }

        function addToCart(name, price, img) {
            cart.push({ n: name, p: price, img: img });
            updateCartCount();
            if(appUser) db.ref('users/'+appUser.uid+'/cart').set(cart);
            alert("تمت الإضافة للسلة");
        }

        function sendOrder() {
            if(cart.length === 0) return alert("السلة فارغة");
            let city = document.getElementById('userCity').value;
            let pay = document.getElementById('userPayment').value;
            
            let msg = `طلب جديد:\nالمحافظة: ${city}\nالدفع: ${pay}\n\nالمنتجات:\n`;
            let total = 0;
            cart.forEach(item => {
                msg += `- ${item.n} (${item.p} د.ع)\n`;
                total += item.p;
            });
            msg += `\nالإجمالي: ${total} د.ع`;
            
            db.ref('orders').push({
                uid: appUser ? appUser.uid : 'guest',
                summary: msg,
                total: total,
                date: new Date().toISOString()
            });

            window.open(`https://wa.me/9647883002797?text=${encodeURIComponent(msg)}`, '_blank');
            cart = [];
            updateCartCount();
            if(appUser) db.ref('users/'+appUser.uid+'/cart').set([]);
            toggleCartModal();
        }

        // --- دوال التنقل المساعدة ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openAccount() {
            if(appUser) document.getElementById('accountModal').classList.add('active-flex');
            else document.getElementById('authModal').classList.add('active-flex');
        }

        function closeAuthModal() { document.getElementById('authModal').classList.remove('active-flex'); }
        function closeAccountModal() { document.getElementById('accountModal').classList.remove('active-flex'); }

        // تحميل البيانات الأساسية
        window.onload = async () => {
            let catSnap = await db.ref('categories').once('value');
            const list = document.getElementById('categoriesList');
            catSnap.forEach(child => {
                let c = child.val();
                list.innerHTML += `
                    <div class="cat-card-new" onclick="openCategory('${c.name}')">
                        <img src="${c.img}">
                        <div class="cat-card-label">${c.name}</div>
                    </div>
                `;
            });
            updateAccountUI();
            updateCartCount();
        };

        async function openCategory(name) {
            showPage('categoryView');
            document.getElementById('catTitle').innerText = name;
            const grid = document.getElementById('catGrid');
            grid.innerHTML = "جاري التحميل...";
            
            let prodSnap = await db.ref('products').orderByChild('category').equalTo(name).once('value');
            grid.innerHTML = "";
            prodSnap.forEach(child => {
                let p = child.val();
                grid.innerHTML += `
                    <div class="cat-card-new" style="height:auto; padding-bottom:10px;">
                        <img src="${p.img}" style="height:200px;">
                        <div style="padding:10px;">
                            <h4>${p.name}</h4>
                            <p style="color:var(--gold)">${p.price} د.ع</p>
                            <button class="btn-gold" onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">إضافة للسلة</button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
